name: Release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin
          - os: windows-latest
            platform: windows
          - os: ubuntu-latest
            platform: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }
      - uses: actions/setup-go@v5
        with: { go-version: "1.23" }
      - name: Install Linux system deps
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev
      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - run: bun install --frozen-lockfile
      - name: Build desktop binary
        run: cd apps/desktop && wails build -platform ${{ matrix.platform }}/amd64
      - name: Package artifact
        shell: bash
        run: |
          cd apps/desktop/build/bin
          ls -la
          tar -czf "option-tab_${GITHUB_REF_NAME#v}_${{ matrix.platform }}_amd64.tar.gz" --exclude='*.tar.gz' *
      - uses: softprops/action-gh-release@v2
        with:
          files: apps/desktop/build/bin/*.tar.gz
